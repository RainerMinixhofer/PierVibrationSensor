[env:tests_interactive]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2w
framework = arduino
extra_scripts = extra_script.py
lib_deps = 
	SPI
	bodmer/TFT_eSPI@^2.5.43
	arduino-libraries/SD@^1.3.0
	khoih-prog/Ethernet_Generic@^2.8.1
	throwtheswitch/Unity@^2.6.1
board_build.filesystem = littlefs
board_build.filesystem_size = 1MB
test_framework = unity
test_filter = test_all
build_flags = 
	-DDEBUG_BUILD
	-D ENABLE_SYSINFO_TESTS=1
	-D ENABLE_TFT_TESTS=1
	-D ENABLE_WIZNET_TESTS=1
	-D ENABLE_SD_TESTS=0
	-D ENABLE_INTERACTIVE_TESTS=1
	-D ENABLE_SINGLE_TEST=0
	-D USER_SETUP_LOADED=1
	-include $PROJECT_DIR/include/pin_config.h
	-Wno-address-of-packed-member
	-I$PROJECT_DIR/.pio/libdeps/${this.__env__}/Unity/src

