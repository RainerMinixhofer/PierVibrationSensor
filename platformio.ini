; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = debug
build_dir = ${sysenv.USERPROFILE}/.platformio/build/${PROJECT_HASH}
libdeps_dir = ${sysenv.USERPROFILE}/.platformio/libdeps/${PROJECT_HASH}

[env:debug]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2w
framework = arduino
extra_scripts = extra_script.py
lib_deps = 
	SPI
	adafruit/Adafruit ICM20X@^2.0.7
	bodmer/TFT_eSPI@^2.5.43
	greiman/SdFat@^2.2.3
	arduino-libraries/SD@^1.3.0
	khoih-prog/Ethernet_Generic@^2.8.1
board_build.filesystem = littlefs
board_build.filesystem_size = 1MB
test_framework = custom
build_flags = 
	-DDEBUG_BUILD
	-D USER_SETUP_LOADED=1
	-include $PROJECT_DIR/include/pin_config.h

[env:release]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2w
