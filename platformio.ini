; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = debug

[env:debug]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2w
framework = arduino
extra_scripts = extra_script.py
lib_deps = 
	SPI
	XPT2046_Touchscreen
	adafruit/Adafruit ICM20X@^2.0.7
	khoih-prog/Ethernet_Generic@^2.8.1
	bodmer/TFT_eSPI@^2.5.43
	greiman/SdFat@^2.2.3
board_build.filesystem = littlefs
board_build.filesystem_size = 1MB
test_framework = custom
build_flags = 
	-DDEBUG_BUILD
	-D USER_SETUP_LOADED=1
    -include $PROJECT_DIR/include/eSPI_Setup.h

[env:release]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2w
framework = arduino
extra_scripts = extra_script.py
lib_deps = 
	SPI
	XPT2046_Touchscreen
	adafruit/Adafruit ICM20X@^2.0.7
	khoih-prog/Ethernet_Generic@^2.8.1
	bodmer/TFT_eSPI@^2.5.43
	greiman/SdFat@^2.2.3
board_build.filesystem = littlefs
board_build.filesystem_size = 1MB
test_framework = custom
build_flags = 
	-DRELEASE_BUILD
	-D USER_SETUP_LOADED=1
    -include $PROJECT_DIR/include/eSPI_Setup.h

[env:tests_interactive]
platform = https://github.com/maxgerhardt/platform-raspberrypi.git
board = rpipico2w
framework = arduino
extra_scripts = extra_script.py
lib_deps = 
	SPI
	bodmer/TFT_eSPI@^2.5.43
	arduino-libraries/Ethernet@^2.0.2
board_build.filesystem = littlefs
board_build.filesystem_size = 1MB
test_framework = custom
test_filter = test_all
build_flags = 
	-DDEBUG_BUILD
	-D ENABLE_SYSINFO_TESTS=1
	-D ENABLE_TFT_TESTS=1
	-D ENABLE_WIZNET_TESTS=1
	-D ENABLE_INTERACTIVE_TESTS=1
	-D ENABLE_SINGLE_TEST=0
	-D USER_SETUP_LOADED=1
    -include $PROJECT_DIR/include/eSPI_Setup.h

